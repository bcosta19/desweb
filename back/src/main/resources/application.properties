spring.application.name=back

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/desweb}
spring.datasource.username=${DB_USERNAME:teste}
spring.datasource.password=${DB_PASSWORD:teste123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.transaction-isolation=2

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

server.port=8080

# JWT — sobrescreva via variável de ambiente em produção
jwt.secret=${JWT_SECRET:mude-esta-chave-em-producao-use-no-minimo-32-chars}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
